<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Tajawal',sans-serif;direction:rtl;background:#f0f4f8;min-height:100vh}
#root{min-height:100vh}
.plat{min-height:100vh;font-family:'Tajawal',sans-serif;direction:rtl;background:#f0f4f8}
.card{background:white;border-radius:16px;padding:20px;box-shadow:0 1px 12px rgba(0,0,0,.07)}
.inp{width:100%;padding:11px 14px;border:2px solid #e2e8f0;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:border .2s;background:white;color:#1e293b}

.tab{padding:7px 18px;border-radius:20px;border:2px solid #e2e8f0;background:white;cursor:pointer;font-size:13px;font-weight:700;color:#64748b;font-family:'Tajawal',sans-serif;transition:all .2s}
.tab.on{background:#1d4ed8;border-color:#1d4ed8;color:white}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ADMIN_PASSWORD = "1234";
const DEFAULT_SUBJECTS = ["علوم","رياضيات","لغة عربية","اجتماعيات"];
const uid = () => Math.random().toString(36).substr(2,9);

const calcResults = (exam, answers) => {
  let total=0, maxTotal=0;
  const subjectScores={};
  exam.subjects.forEach(sub=>{
    let score=0,maxScore=0;
    sub.questions.forEach(q=>{
      maxScore+=Number(q.grade)||0;
      if(answers[q.id]!==undefined && Number(answers[q.id])===Number(q.correct)) score+=Number(q.grade)||0;
    });
    subjectScores[sub.name]={score,maxScore};
    total+=score; maxTotal+=maxScore;
  });
  return {subjectScores,total,maxTotal};
};

const gradeInfo = (pct) => {
  if(pct>=90) return {label:"ممتاز",color:"#166534",bg:"#dcfce7"};
  if(pct>=80) return {label:"جيد جداً",color:"#1e40af",bg:"#dbeafe"};
  if(pct>=70) return {label:"جيد",color:"#6b21a8",bg:"#f3e8ff"};
  if(pct>=60) return {label:"مقبول",color:"#9a3412",bg:"#ffedd5"};
  return {label:"ضعيف",color:"#991b1b",bg:"#fee2e2"};
};

/* ─── MAIN APP ─── */
function App(){
  const [screen,setScreen]=useState("home");
  const [exams,setExams]=useState([]);
  const [allResults,setAllResults]=useState([]);
  const [student,setStudent]=useState({name:"",number:"",cls:""});
  const [currentExamId,setCurrentExamId]=useState(null);
  const [answers,setAnswers]=useState({});
  const [subjectIdx,setSubjectIdx]=useState(0);
  const [quizResults,setQuizResults]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [adminInput,setAdminInput]=useState("");
  const [adminErr,setAdminErr]=useState("");
  const [editExamId,setEditExamId]=useState(null);
  const [editSubIdx,setEditSubIdx]=useState(0);
  const [newTitle,setNewTitle]=useState("");
  const [newTotalStudents,setNewTotalStudents]=useState("");
  const [newTimer,setNewTimer]=useState(0);
  const [newPractice,setNewPractice]=useState(false);
  const [newPublishAt,setNewPublishAt]=useState("");
  const [showNewExam,setShowNewExam]=useState(false);
  const [adminPass,setAdminPass]=useState("1234");
  const [apiKey,setApiKey]=useState("");
  const [dbStatus,setDbStatus]=useState("connecting"); // connecting | ok | error

  useEffect(()=>{
    // Real-time listeners
    const unsubExams=db.collection("exams").orderBy("createdAt","asc").onSnapshot(
      snap=>{ setExams(snap.docs.map(d=>({...d.data(),id:d.id}))); setDbStatus("ok"); },
      ()=>setDbStatus("error")
    );
    const unsubResults=db.collection("results").orderBy("ts","asc").onSnapshot(
      snap=>{ setAllResults(snap.docs.map(d=>d.data())); },
      ()=>{}
    );
    db.collection("settings").doc("config").get().then(d=>{
      if(d.exists&&d.data().adminPass) setAdminPass(d.data().adminPass);
      if(d.exists&&d.data().apiKey) setApiKey(d.data().apiKey);
    });
    return ()=>{ unsubExams(); unsubResults(); };
  },[]);

  const saveExam=(exam)=>db.collection("exams").doc(exam.id).set(exam);
  const deleteExamDB=(id)=>db.collection("exams").doc(id).delete();

  const saveResult=(rec)=>db.collection("results").doc(rec.id).set(rec);
  const clearResultsDB=async()=>{
    const snap=await db.collection("results").get();
    const batch=db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  };

  const currentExam=exams.find(e=>e.id===currentExamId);

  const goHome=()=>{ setScreen("home"); setAnswers({}); setSubjectIdx(0); setCurrentExamId(null); setQuizResults(null); };

  const loginStudent=()=>{
    if(!student.name.trim()||!student.number.trim()||!student.cls.trim()) return;
    setScreen("exam_select");
  };

  const startExam=(id)=>{ setCurrentExamId(id); setAnswers({}); setSubjectIdx(0); setScreen("quiz"); };

  const submitQuiz=()=>{
    if(!currentExam) return;
    const res=calcResults(currentExam,answers);
    setQuizResults(res);
    const rec={id:uid(),name:student.name,number:student.number,cls:student.cls,examId:currentExam.id,examTitle:currentExam.title,ts:new Date().toISOString(),res};
    saveResult(rec);
    setScreen("results");
  };

  const loginAdmin=()=>{
    if(adminInput===adminPass){ setIsAdmin(true); setScreen("admin"); setAdminErr(""); setAdminInput(""); }
    else setAdminErr("كلمة المرور غير صحيحة");
  };
  const logoutAdmin=()=>{ setIsAdmin(false); goHome(); };

  const createExam=()=>{
    const exam={
      id:uid(),
      title:newTitle.trim()||"اختبار جديد",
      totalStudents:140,
      createdAt:new Date().toISOString(),
      timerMinutes:Number(newTimer)||0,
      isPractice:newPractice,
      publishAt:newPublishAt||null,
      subjects:DEFAULT_SUBJECTS.map(n=>({name:n,questions:[]}))
    };
    saveExam(exam);
    setNewTitle(""); setNewTotalStudents(""); setNewTimer(0); setNewPractice(false); setNewPublishAt(""); setShowNewExam(false);
    setEditExamId(exam.id); setEditSubIdx(0); setScreen("editor");
  };

  const deleteExam=(id)=>{ if(!window.confirm("تأكيد حذف الاختبار؟")) return; deleteExamDB(id); };
  const updateExamTitle=(id,t)=>{
    const exam=exams.find(e=>e.id===id);
    if(exam) saveExam({...exam,title:t});
  };

  const addQuestion=(examId,sIdx)=>{
    const q={id:uid(),text:"",image:null,options:["","","",""],correct:0,grade:2};
    const exam=exams.find(e=>e.id===examId); if(!exam) return;
    const ss=[...exam.subjects]; ss[sIdx]={...ss[sIdx],questions:[...ss[sIdx].questions,q]};
    saveExam({...exam,subjects:ss});
  };

  const updateQ=(examId,sIdx,qId,field,val)=>{
    const exam=exams.find(e=>e.id===examId); if(!exam) return;
    const ss=[...exam.subjects];
    ss[sIdx]={...ss[sIdx],questions:ss[sIdx].questions.map(q=>q.id===qId?{...q,[field]:val}:q)};
    saveExam({...exam,subjects:ss});
  };

  const updateOpt=(examId,sIdx,qId,oIdx,val)=>{
    const exam=exams.find(e=>e.id===examId); if(!exam) return;
    const ss=[...exam.subjects];
    ss[sIdx]={...ss[sIdx],questions:ss[sIdx].questions.map(q=>{
      if(q.id!==qId) return q;
      const opts=[...q.options]; opts[oIdx]=val; return {...q,options:opts};
    })};
    saveExam({...exam,subjects:ss});
  };

  const deleteQ=(examId,sIdx,qId)=>{
    const exam=exams.find(e=>e.id===examId); if(!exam) return;
    const ss=[...exam.subjects];
    ss[sIdx]={...ss[sIdx],questions:ss[sIdx].questions.filter(q=>q.id!==qId)};
    saveExam({...exam,subjects:ss});
  };

  const uploadImg=(examId,sIdx,qId,file)=>{
    const r=new FileReader();
    r.onload=ev=>updateQ(examId,sIdx,qId,"image",ev.target.result);
    r.readAsDataURL(file);
  };

  const editExam=exams.find(e=>e.id===editExamId);

  const changeAdminPass=(p)=>{
    setAdminPass(p);
    db.collection("settings").doc("config").set({adminPass:p,apiKey},{ merge:true });
  };
  const changeApiKey=(k)=>{
    setApiKey(k);
    db.collection("settings").doc("config").set({apiKey:k,adminPass},{ merge:true });
  };

  return (
    <div className="plat" dir="rtl">
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",padding:"0 20px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px rgba(0,0,0,.25)"}}>
        <div onClick={goHome} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>

          <span style={{fontSize:24}}>📚</span>
          <span style={{color:"white",fontWeight:900,fontSize:15}}>مدرسة عبيدة بن الحارث المتوسطة</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!isAdmin ? (
            <button className="btn" onClick={()=>setScreen("admin_login")} style={{background:"rgba(255,255,255,.15)",color:"white",border:"1px solid rgba(255,255,255,.35)",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700}}>
              🔐 دخول المعلم
            </button>
          ):(
            <>
              <button className="btn" onClick={()=>setScreen("admin")} style={{background:"rgba(255,255,255,.15)",color:"white",border:"1px solid rgba(255,255,255,.3)",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700}}>⚙️ لوحة التحكم</button>
              <button className="btn" onClick={logoutAdmin} style={{background:"rgba(239,68,68,.35)",color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700}}>خروج</button>
            </>
          )}
          <div title={dbStatus==="ok"?"متصل بقاعدة البيانات":dbStatus==="error"?"خطأ في الاتصال":"جارٍ الاتصال..."} style={{width:10,height:10,borderRadius:"50%",background:dbStatus==="ok"?"#4ade80":dbStatus==="error"?"#f87171":"#fbbf24",marginRight:4,flexShrink:0,boxShadow:`0 0 6px ${dbStatus==="ok"?"#4ade80":dbStatus==="error"?"#f87171":"#fbbf24"}`}}/>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"30px 16px"}}>

        {/* HOME */}
        {screen==="home" && (
          <div style={{margin:"0 -16px"}}>

            {/* Top dark bar */}
            <div style={{background:"#1e293b",padding:"10px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px)",backgroundSize:"28px 28px"}}/>
              <p style={{color:"#e2e8f0",fontSize:14,fontWeight:600,position:"relative",letterSpacing:1}}>✦ نحو تعليم يُلهم ومستقبل يُبهر ✦</p>
            </div>

            {/* Golden motto banner */}
            <div style={{background:"linear-gradient(135deg,#d97706,#f59e0b,#fbbf24)",padding:"32px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-20,right:-20,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.08)"}}/>
              <div style={{position:"absolute",bottom:-30,left:-20,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,.06)"}}/>
              <span style={{color:"rgba(30,41,59,.5)",fontSize:40,position:"absolute",top:16,right:30,fontWeight:900}}>✦</span>
              <span style={{color:"rgba(30,41,59,.5)",fontSize:40,position:"absolute",top:16,left:30,fontWeight:900}}>✦</span>
              <p style={{fontSize:22,fontWeight:900,color:"#1e293b",lineHeight:1.7,marginBottom:10,position:"relative"}}>
                "العلم نور يضيء العقول، والأخلاق تاج يزين الرجال<br/>– فكن طالباً يجمعهما معاً"
              </p>
              <p style={{fontSize:13,color:"#78350f",fontWeight:700,position:"relative"}}>– شعار مدرستنا</p>
            </div>

            {/* هويتنا التعليمية */}
            <div style={{padding:"28px 16px",background:"#f8fafc"}}>
              <div style={{textAlign:"center",marginBottom:22,position:"relative"}}>
                <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#1e3a8a,transparent)",transform:"translateY(-50%)"}}/>
                <span style={{background:"#f8fafc",padding:"0 18px",fontSize:20,fontWeight:900,color:"#1e3a8a",position:"relative"}}>هويتنا التعليمية</span>
              </div>

              {/* رؤيتنا & رسالتنا */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14,marginBottom:14,maxWidth:700,margin:"0 auto 14px"}}>
                <div style={{background:"white",borderRadius:16,padding:"24px 20px",border:"2px solid #1e3a8a",boxShadow:"0 4px 16px rgba(30,58,138,.1)"}}>
                  <div style={{width:60,height:60,borderRadius:"50%",background:"#e0e7ff",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28}}>🔭</div>
                  <p style={{fontWeight:900,fontSize:18,color:"#1e3a8a",textAlign:"center",marginBottom:12}}>رؤيتنا</p>
                  <p style={{fontSize:14,color:"#475569",lineHeight:1.9,textAlign:"center"}}>أن نكون مدرسةً رائدةً في تكوين جيل متميز علمياً وأخلاقياً، قادر على مواكبة متطلبات العصر والإسهام في بناء وطنه بثقة واقتدار.</p>
                </div>
                <div style={{background:"white",borderRadius:16,padding:"24px 20px",border:"2px solid #d97706",boxShadow:"0 4px 16px rgba(217,119,6,.1)"}}>
                  <div style={{width:60,height:60,borderRadius:"50%",background:"#fef3c7",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28}}>📣</div>
                  <p style={{fontWeight:900,fontSize:18,color:"#92400e",textAlign:"center",marginBottom:12}}>رسالتنا</p>
                  <p style={{fontSize:14,color:"#475569",lineHeight:1.9,textAlign:"center"}}>تقديم بيئة تعليمية آمنة ومحفزة تنمّي عقول الطلاب ومهاراتهم وقيمهم، من خلال كادر تعليمي متخصص وشراكة فاعلة مع الأسرة والمجتمع.</p>
                </div>
              </div>

              {/* أهدافنا */}
              <div style={{maxWidth:700,margin:"0 auto 24px",background:"white",borderRadius:16,padding:"22px 20px",border:"2px solid #16a34a",boxShadow:"0 4px 16px rgba(22,163,74,.1)"}}>
                <p style={{fontWeight:900,fontSize:18,color:"#166534",textAlign:"center",marginBottom:14}}>🏆 أهدافنا</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10}}>
                  {[
                    ["📈","رفع التحصيل الدراسي لجميع الطلاب"],
                    ["🎯","التميز في اختبارات نافس والمركزية"],
                    ["💡","تنمية مهارات التفكير الناقد والإبداعي"],
                    ["🤝","تعزيز الشراكة بين المدرسة والأسرة"],
                  ].map(([icon,text],i)=>(
                    <div key={i} style={{background:"#f0fdf4",borderRadius:12,padding:"12px",textAlign:"center"}}>
                      <span style={{fontSize:22}}>{icon}</span>
                      <p style={{fontSize:12,color:"#166534",fontWeight:700,marginTop:6,lineHeight:1.6}}>{text}</p>
                    </div>
                  ))}
                  <div style={{gridColumn:"1 / -1",background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:12,padding:"16px 20px",textAlign:"center",boxShadow:"0 4px 14px rgba(37,99,235,.25)"}}>
                    <p style={{fontSize:16,fontWeight:900,color:"white",lineHeight:1.8}}>
                      🌟 تدريب على اختبارات نافس الوطنية والاختبارات المركزية 🌟
                    </p>
                  </div>
                </div>
              </div>

              {/* Login card */}
              <div style={{maxWidth:420,margin:"0 auto",background:"white",borderRadius:16,padding:28,boxShadow:"0 4px 20px rgba(0,0,0,.08)"}}>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <span style={{fontSize:44}}>🎓</span>
                  <p style={{fontWeight:900,fontSize:16,color:"#1e3a8a",marginTop:8}}>أدخل بياناتك للبدء</p>
                  <p style={{fontSize:12,color:"#94a3b8",marginTop:4}}>للتدريب على اختبارات نافس والاختبارات المركزية 1447هـ</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {[["name","اسم الطالب","أدخل الاسم الرباعي"],["number","رقم الطالب","رقمك في كشف الحضور"],["cls","الفصل","مثال: الثالث أ"]].map(([k,label,ph])=>(
                    <div key={k}>
                      <label style={{display:"block",fontWeight:700,marginBottom:6,color:"#334155",fontSize:14}}>{label}</label>
                      <input className="inp" placeholder={ph} value={student[k]} onChange={e=>setStudent({...student,[k]:e.target.value})} onKeyDown={e=>e.key==="Enter"&&loginStudent()} />
                    </div>
                  ))}
                  <button className="btn btn-blue" style={{width:"100%",marginTop:4,fontSize:16,padding:"13px"}} onClick={loginStudent} disabled={!student.name.trim()||!student.number.trim()||!student.cls.trim()}>
                    دخول →
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* EXAM SELECT */}
        {screen==="exam_select" && (
          <div>
            <button className="btn btn-ghost" style={{marginBottom:18}} onClick={goHome}>→ رجوع</button>
            <div className="card" style={{marginBottom:18,background:"linear-gradient(135deg,#eff6ff,#dbeafe)",border:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <span style={{fontSize:42}}>👋</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:18,fontWeight:800,color:"#1e3a8a"}}>أهلاً {student.name}</p>
                  <p style={{fontSize:13,color:"#3b82f6",marginTop:3}}>الفصل: {student.cls} &nbsp;•&nbsp; الرقم: {student.number}</p>
                </div>
                <button className="btn" style={{background:"#1d4ed8",color:"white",border:"none",borderRadius:9,padding:"8px 14px",fontSize:12,fontWeight:700}}
                  onClick={()=>setScreen("my_results")}>📋 سجلاتي</button>
              </div>
            </div>
            <h2 style={{fontSize:17,fontWeight:800,marginBottom:12,color:"#1e293b"}}>اختر الاختبار</h2>
            {exams.length===0 ? (
              <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:52}}>
                <p style={{fontSize:36,marginBottom:10}}>📭</p>
                <p style={{fontSize:15}}>لا توجد اختبارات متاحة حالياً</p>
                <p style={{fontSize:12,marginTop:6}}>انتظر حتى يضيف المعلم اختباراً</p>
              </div>
            ):(()=>{
              const now=new Date();
              const visible=exams.filter(e=>!e.publishAt||new Date(e.publishAt)<=now);
              if(visible.length===0) return (
                <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:52}}>
                  <p style={{fontSize:36,marginBottom:10}}>🕐</p>
                  <p style={{fontSize:15}}>لا توجد اختبارات متاحة الآن</p>
                  <p style={{fontSize:12,marginTop:6}}>ستظهر الاختبارات في موعدها المحدد</p>
                </div>
              );
              return (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {visible.map((exam,i)=>{
                  const totalQ=exam.subjects.reduce((a,s)=>a+s.questions.length,0);
                  const totalG=exam.subjects.reduce((a,s)=>a+s.questions.reduce((b,q)=>b+(Number(q.grade)||0),0),0);
                  const icons=["📝","✏️","📖","🔬","🧮","📐","🗒️","📋"];
                  const colors=["#eff6ff","#f0fdf4","#fdf4ff","#fff7ed","#fef2f2","#f0fdfa"];
                  return (
                    <div key={exam.id} className="card fade-in" style={{cursor:"pointer",border:"2px solid transparent",transition:"all .2s",background:colors[i%colors.length]}}
                      onClick={()=>startExam(exam.id)}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="#2563eb";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(37,99,235,.15)"}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="transparent";e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 1px 12px rgba(0,0,0,.07)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:13}}>
                          <div style={{width:50,height:50,borderRadius:13,background:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 2px 8px rgba(0,0,0,.08)"}}>{exam.isPractice?"🎯":icons[i%icons.length]}</div>
                          <div>
                            <p style={{fontWeight:800,fontSize:16,color:"#1e293b"}}>{exam.title}</p>
                            <p style={{fontSize:12,color:"#64748b",marginTop:3}}>{totalQ} سؤال &nbsp;•&nbsp; {totalG} درجة</p>
                            <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}>
                              {exam.isPractice&&<span style={{fontSize:10,fontWeight:700,background:"#dcfce7",color:"#166534",borderRadius:5,padding:"2px 7px"}}>🎯 تدريبي</span>}
                              {exam.timerMinutes>0&&<span style={{fontSize:10,fontWeight:700,background:"#dbeafe",color:"#1d4ed8",borderRadius:5,padding:"2px 7px"}}>⏱️ {exam.timerMinutes} دقيقة</span>}
                            </div>
                          </div>
                        </div>
                        <span style={{fontSize:22,color:"#2563eb"}}>←</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              );
            })()}
          </div>
        )}

        {/* MY RESULTS */}
        {screen==="my_results" && (
          <div>
            <button className="btn btn-ghost" style={{marginBottom:18}} onClick={()=>setScreen("exam_select")}>→ رجوع</button>
            <h2 style={{fontSize:18,fontWeight:900,color:"#1e3a8a",marginBottom:14}}>📋 سجل نتائجي — {student.name}</h2>
            {allResults.filter(r=>r.number===student.number&&r.cls===student.cls).length===0?(
              <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:52}}>
                <p style={{fontSize:36,marginBottom:10}}>📭</p>
                <p>لا توجد نتائج سابقة</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {allResults.filter(r=>r.number===student.number&&r.cls===student.cls).reverse().map(r=>{
                  const pct=r.res.maxTotal?Math.round(r.res.total/r.res.maxTotal*100):0;
                  const g=gradeInfo(pct);
                  const date=new Date(r.ts).toLocaleDateString("ar-SA-u-ca-islamic",{year:"numeric",month:"long",day:"numeric"});
                  return (
                    <div key={r.id} className="card fade-in" style={{padding:"14px 18px",border:`2px solid ${g.color}30`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <p style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{r.examTitle}</p>
                          <p style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{date}</p>
                        </div>
                        <div style={{textAlign:"center"}}>
                          <p style={{fontSize:26,fontWeight:900,color:g.color}}>{pct}%</p>
                          <span className="badge" style={{background:g.bg,color:g.color}}>{g.label}</span>
                        </div>
                      </div>
                      <div className="pbar" style={{marginTop:10}}><div className="pfill" style={{width:`${pct}%`,background:g.color}}/></div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* QUIZ */}
        {screen==="quiz" && currentExam && (
          <QuizScreen exam={currentExam} answers={answers} setAnswers={setAnswers}
            subjectIdx={subjectIdx} setSubjectIdx={setSubjectIdx}
            onSubmit={submitQuiz} onBack={goHome} />
        )}

        {/* RESULTS */}
        {screen==="results" && quizResults && (
          <ResultsScreen res={quizResults} student={student} examTitle={currentExam?.title} exam={currentExam} answers={answers} onBack={goHome} />
        )}

        {/* ADMIN LOGIN */}
        {screen==="admin_login" && (
          <div style={{maxWidth:380,margin:"0 auto"}}>
            <button className="btn btn-ghost" style={{marginBottom:18}} onClick={goHome}>→ رجوع</button>
            <div className="card" style={{padding:30}}>
              <div style={{textAlign:"center",marginBottom:20}}>
                <span style={{fontSize:50}}>🔐</span>
                <h2 style={{fontSize:21,fontWeight:900,color:"#1e293b",marginTop:8}}>دخول المعلم</h2>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <input className="inp" type="password" placeholder="كلمة المرور" value={adminInput}
                  onChange={e=>setAdminInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&loginAdmin()} />
                {adminErr && <p style={{color:"#ef4444",fontSize:13,fontWeight:700,textAlign:"center"}}>{adminErr}</p>}
                <button className="btn btn-blue" style={{width:"100%",padding:"13px"}} onClick={loginAdmin}>دخول</button>
              </div>
            </div>
          </div>
        )}

        {/* ADMIN PANEL */}
        {screen==="admin" && isAdmin && (
          <AdminPanel exams={exams} allResults={allResults}
            onNewExam={()=>setShowNewExam(true)} showNewExam={showNewExam}
            newTitle={newTitle} setNewTitle={setNewTitle}
            newTimer={newTimer} setNewTimer={setNewTimer}
            newPractice={newPractice} setNewPractice={setNewPractice}
            newPublishAt={newPublishAt} setNewPublishAt={setNewPublishAt}
            onCreateExam={createExam} onCancelNew={()=>{setShowNewExam(false);setNewTitle("");setNewTimer(0);setNewPractice(false);setNewPublishAt("");}}
            onEditExam={(id)=>{setEditExamId(id);setEditSubIdx(0);setScreen("editor");}}
            onDeleteExam={deleteExam}
            onViewResults={()=>setScreen("all_results")}
            onAIImport={()=>setScreen("ai_import")}
            adminPass={adminPass} apiKey={apiKey}
            onChangePass={changeAdminPass} onChangeApiKey={changeApiKey}
          />
        )}

        {/* AI IMPORT */}
        {screen==="ai_import" && isAdmin && (
          <AIImportScreen
            apiKey={apiKey}
            onSaveExam={(exam)=>{ saveExam(exam); setScreen("admin"); }}
            onBack={()=>setScreen("admin")}
          />
        )}

        {/* EDITOR */}
        {screen==="editor" && isAdmin && editExam && (
          <EditorScreen exam={editExam} subjectIdx={editSubIdx} setSubjectIdx={setEditSubIdx}
            onUpdateTitle={t=>updateExamTitle(editExamId,t)}
            onAddQ={()=>addQuestion(editExamId,editSubIdx)}
            onUpdateQ={(qId,f,v)=>updateQ(editExamId,editSubIdx,qId,f,v)}
            onUpdateOpt={(qId,oIdx,v)=>updateOpt(editExamId,editSubIdx,qId,oIdx,v)}
            onDeleteQ={qId=>deleteQ(editExamId,editSubIdx,qId)}
            onUploadImg={(qId,file)=>uploadImg(editExamId,editSubIdx,qId,file)}
            onBack={()=>setScreen("admin")} />
        )}

        {/* ALL RESULTS */}
        {screen==="all_results" && isAdmin && (
          <AllResultsScreen results={allResults} exams={exams}
            onClearResults={clearResultsDB}
            onBack={()=>setScreen("admin")} />
        )}

      </div>
    </div>
  );
}

/* ─── QUIZ SCREEN ─── */
function QuizScreen({exam,answers,setAnswers,subjectIdx,setSubjectIdx,onSubmit,onBack}){
  const [confirmModal,setConfirmModal]=useState(false);
  const [practiceResult,setPracticeResult]=useState({}); // {qId: true/false}
  const activeSubs=exam.subjects.filter(s=>s.questions.length>0);
  const currentSub=activeSubs[subjectIdx];
  if(!currentSub) return null;

  const totalQ=activeSubs.reduce((a,s)=>a+s.questions.length,0);
  const answeredCount=Object.keys(answers).length;
  const isLast=subjectIdx===activeSubs.length-1;

  // Timer
  const totalSeconds=useRef((exam.timerMinutes||0)*60);
  const [timeLeft,setTimeLeft]=useState(totalSeconds.current);
  useEffect(()=>{
    if(!exam.timerMinutes||exam.timerMinutes<=0) return;
    const t=setInterval(()=>{
      setTimeLeft(s=>{
        if(s<=1){ clearInterval(t); onSubmit(); return 0; }
        return s-1;
      });
    },1000);
    return ()=>clearInterval(t);
  },[]);
  const mins=Math.floor(timeLeft/60);
  const secs=timeLeft%60;
  const isWarning=exam.timerMinutes>0&&timeLeft<=60;

  // Hijri date & day
  const now = new Date();
  const hijriDate = now.toLocaleDateString("ar-SA-u-ca-islamic", {weekday:"long", year:"numeric", month:"long", day:"numeric"});

  const handlePrint = () => window.print();

  const handleAnswer=(qId,oi,correct)=>{
    setAnswers({...answers,[qId]:oi});
    if(exam.isPractice){
      setPracticeResult(p=>({...p,[qId]:Number(oi)===Number(correct)}));
    }
  };

  return (
    <div>
      {/* Date + Print header */}
      <div id="print-header" style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:14,padding:"14px 18px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <p style={{color:"#fbbf24",fontSize:13,fontWeight:900,marginBottom:2}}>مدرسة عبيدة بن الحارث المتوسطة</p>
          <p style={{color:"white",fontSize:16,fontWeight:800}}>{exam.title}</p>
          {exam.isPractice&&<span style={{fontSize:11,fontWeight:700,background:"rgba(255,255,255,.2)",color:"white",borderRadius:6,padding:"2px 8px",marginTop:4,display:"inline-block"}}>🎯 وضع التدريب</span>}
        </div>
        <div style={{textAlign:"center"}}>
          <p style={{color:"#93c5fd",fontSize:11,marginBottom:2}}>التاريخ</p>
          <p style={{color:"white",fontSize:13,fontWeight:700}}>{hijriDate}</p>
        </div>
        {exam.timerMinutes>0&&(
          <div className={isWarning?"timer-warning":""} style={{background:isWarning?"rgba(239,68,68,.3)":"rgba(255,255,255,.15)",borderRadius:10,padding:"8px 16px",textAlign:"center",border:isWarning?"2px solid #ef4444":"none"}}>
            <p style={{color:isWarning?"#fca5a5":"#93c5fd",fontSize:11,marginBottom:2}}>الوقت المتبقي</p>
            <p style={{color:"white",fontSize:22,fontWeight:900,fontVariantNumeric:"tabular-nums"}}>{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</p>
          </div>
        )}
        <button onClick={handlePrint} className="btn no-print" style={{background:"rgba(255,255,255,.2)",color:"white",border:"1px solid rgba(255,255,255,.4)",borderRadius:9,padding:"8px 16px",fontSize:13,fontWeight:700}}>
          🖨️ طباعة
        </button>
      </div>

      {/* Progress */}
      <div className="card" style={{marginBottom:14,padding:"11px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <span style={{fontWeight:700,fontSize:13,color:"#475569"}}>تقدمك في الاختبار</span>
          <span style={{fontSize:13,color:"#64748b",fontWeight:700}}>{answeredCount} / {totalQ} أُجيب</span>
        </div>
        <div className="pbar"><div className="pfill" style={{width:`${totalQ?answeredCount/totalQ*100:0}%`}}/></div>
      </div>

      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {activeSubs.map((s,idx)=>{
          const ans=s.questions.filter(q=>answers[q.id]!==undefined).length;
          const done=ans===s.questions.length&&s.questions.length>0;
          return (
            <button key={idx} className={`tab ${idx===subjectIdx?"on":done?"done":""}`} onClick={()=>setSubjectIdx(idx)}>
              {done&&idx!==subjectIdx?"✓ ":""}{s.name}
              <span style={{opacity:.7,fontSize:11,marginRight:4}}>({ans}/{s.questions.length})</span>
            </button>
          );
        })}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {currentSub.questions.map((q,qi)=>(
          <div key={q.id} className="card">
            <div style={{display:"flex",gap:11,marginBottom:10}}>
              <div style={{minWidth:30,height:30,borderRadius:8,background:answers[q.id]!==undefined?(practiceResult[q.id]===true?"#166534":practiceResult[q.id]===false?"#dc2626":"#166534"):"#1d4ed8",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,flexShrink:0}}>{qi+1}</div>
              <div style={{flex:1,display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  {q.text&&<p style={{fontSize:15,fontWeight:600,color:"#1e293b",lineHeight:1.7,marginBottom:4}}>{q.text}</p>}
                  <span style={{fontSize:12,color:"#94a3b8"}}>({q.grade} درجة)</span>
                </div>
                {q.image&&(
                  <div style={{flexShrink:0,width:160}}>
                    <img src={q.image} alt="صورة السؤال" style={{width:"100%",borderRadius:10,border:"2px solid #e2e8f0",objectFit:"contain",background:"#f8fafc",display:"block"}}/>
                  </div>
                )}
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {q.options.map((opt,oi)=>{
                if(!opt) return null;
                const isSelected=Number(answers[q.id])===oi;
                const isCorrect=Number(q.correct)===oi;
                const showPractice=exam.isPractice&&answers[q.id]!==undefined;
                let bg="white",border="#e2e8f0",color="#475569";
                if(showPractice&&isCorrect){bg="#dcfce7";border="#86efac";color="#166534";}
                else if(showPractice&&isSelected&&!isCorrect){bg="#fee2e2";border="#fca5a5";color="#dc2626";}
                else if(isSelected){bg="#dbeafe";border="#2563eb";color="#1e40af";}
                return (
                  <button key={oi} className="opt-btn" style={{background:bg,borderColor:border,color,fontWeight:isSelected?700:400}}
                    onClick={()=>handleAnswer(q.id,oi,q.correct)}>
                    <span style={{minWidth:28,height:28,borderRadius:7,background:(showPractice&&isCorrect)?"#166534":isSelected?"#1d4ed8":"#f1f5f9",color:(isSelected||(showPractice&&isCorrect))?"white":"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800}}>
                      {["أ","ب","ج","د"][oi]}
                    </span>
                    {opt}
                    {showPractice&&isCorrect&&<span style={{marginRight:"auto",fontSize:11,fontWeight:800,color:"#166534"}}>✓ صحيح</span>}
                    {showPractice&&isSelected&&!isCorrect&&<span style={{marginRight:"auto",fontSize:11,fontWeight:800,color:"#dc2626"}}>✗ خطأ</span>}
                  </button>
                );
              })}
            </div>
            {/* Practice instant feedback */}
            {exam.isPractice&&answers[q.id]!==undefined&&(
              <div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:practiceResult[q.id]?"#dcfce7":"#fee2e2",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{practiceResult[q.id]?"🎉":"💡"}</span>
                <p style={{fontSize:13,fontWeight:700,color:practiceResult[q.id]?"#166534":"#dc2626"}}>
                  {practiceResult[q.id]?"أحسنت! إجابة صحيحة":"الإجابة الصحيحة: "+q.options[Number(q.correct)]}
                </p>
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10,marginTop:20}}>
        {subjectIdx>0&&<button className="btn btn-ghost" style={{flex:1}} onClick={()=>setSubjectIdx(subjectIdx-1)}>→ السابق</button>}
        {!isLast
          ?<button className="btn btn-blue" style={{flex:2}} onClick={()=>setSubjectIdx(subjectIdx+1)}>التالي ←</button>
          :<button className="btn btn-green" style={{flex:2}} onClick={()=>answeredCount<totalQ?setConfirmModal(true):onSubmit()}>إنهاء الاختبار ✓</button>
        }
      </div>

      {confirmModal&&(
        <div className="modal-bg">
          <div className="card" style={{maxWidth:350,width:"100%",padding:26}}>
            <p style={{fontSize:18,fontWeight:800,marginBottom:10}}>⚠️ تنبيه</p>
            <p style={{color:"#64748b",marginBottom:18,lineHeight:1.7}}>لم تجب على <strong style={{color:"#ef4444"}}>{totalQ-answeredCount} سؤال</strong> بعد. هل تريد الإنهاء؟</p>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-green" style={{flex:1}} onClick={()=>{setConfirmModal(false);onSubmit();}}>تأكيد وإنهاء</button>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmModal(false)}>متابعة الإجابة</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── RESULTS SCREEN ─── */
function ResultsScreen({res,student,examTitle,exam,answers,onBack}){
  const [showFeedback,setShowFeedback]=useState(false);
  const {subjectScores,total,maxTotal}=res;
  const pct=maxTotal?Math.round(total/maxTotal*100):0;
  const g=gradeInfo(pct);

  // Badges
  const badges=[];
  if(pct===100) badges.push({icon:"🏅",label:"علامة كاملة",color:"#d97706",bg:"#fef3c7"});
  if(pct>=90) badges.push({icon:"⭐",label:"ممتاز",color:"#166534",bg:"#dcfce7"});
  if(pct>=80&&pct<90) badges.push({icon:"🥈",label:"جيد جداً",color:"#1e40af",bg:"#dbeafe"});
  const allAnswered=exam&&Object.keys(answers).length===exam.subjects.reduce((a,s)=>a+s.questions.length,0);
  if(allAnswered) badges.push({icon:"✅",label:"أجاب على الكل",color:"#6b21a8",bg:"#f3e8ff"});
  if(exam?.isPractice) badges.push({icon:"🎯",label:"جلسة تدريب",color:"#0891b2",bg:"#e0f2fe"});

  if(showFeedback && exam){
    const activeSubs=exam.subjects.filter(s=>s.questions.length>0);
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button className="btn btn-ghost" onClick={()=>setShowFeedback(false)}>→ رجوع للنتيجة</button>
          <h2 style={{fontSize:18,fontWeight:900,color:"#1e3a8a"}}>📖 التغذية الراجعة</h2>
        </div>

        {activeSubs.map((sub,si)=>(
          <div key={si} style={{marginBottom:20}}>
            <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:12,padding:"10px 16px",marginBottom:12}}>
              <p style={{color:"white",fontWeight:900,fontSize:15}}>📚 {sub.name}</p>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {sub.questions.map((q,qi)=>{
                const studentAns=answers[q.id];
                const isCorrect=Number(studentAns)===Number(q.correct);
                const notAnswered=studentAns===undefined;
                return (
                  <div key={q.id} className="card" style={{border:`2px solid ${notAnswered?"#e2e8f0":isCorrect?"#86efac":"#fca5a5"}`,padding:"14px 16px"}}>
                    <div style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                      <div style={{minWidth:28,height:28,borderRadius:8,background:notAnswered?"#94a3b8":isCorrect?"#166534":"#dc2626",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}}>{qi+1}</div>
                      <div style={{flex:1,display:"flex",gap:10,alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          {q.text&&<p style={{fontSize:14,fontWeight:600,color:"#1e293b",lineHeight:1.7,marginBottom:4}}>{q.text}</p>}
                          <span style={{fontSize:12,color:"#94a3b8"}}>({q.grade} درجة)</span>
                        </div>
                        {q.image&&(
                          <div style={{flexShrink:0,width:140}}>
                            <img src={q.image} alt="صورة السؤال" style={{width:"100%",borderRadius:8,border:"2px solid #e2e8f0",objectFit:"contain",background:"#f8fafc",display:"block"}}/>
                          </div>
                        )}
                      </div>
                      <span style={{fontSize:18,flexShrink:0}}>{notAnswered?"⬜":isCorrect?"✅":"❌"}</span>
                    </div>

                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {q.options.map((opt,oi)=>{
                        if(!opt) return null;
                        const isStudentChoice=Number(studentAns)===oi;
                        const isCorrectOpt=Number(q.correct)===oi;
                        let bg="white", border="#e2e8f0", color="#475569";
                        if(isCorrectOpt){bg="#dcfce7";border="#86efac";color="#166534";}
                        else if(isStudentChoice&&!isCorrectOpt){bg="#fee2e2";border="#fca5a5";color="#dc2626";}
                        return (
                          <div key={oi} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 12px",borderRadius:9,background:bg,border:`2px solid ${border}`}}>
                            <span style={{minWidth:24,height:24,borderRadius:6,background:isCorrectOpt?"#166534":isStudentChoice?"#dc2626":"#f1f5f9",color:isCorrectOpt||isStudentChoice?"white":"#94a3b8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0}}>
                              {["أ","ب","ج","د"][oi]}
                            </span>
                            <span style={{fontSize:13,fontWeight:isCorrectOpt||isStudentChoice?700:400,color}}>{opt}</span>
                            {isCorrectOpt&&<span style={{marginRight:"auto",fontSize:12,fontWeight:800,color:"#166534"}}>✓ الصحيحة</span>}
                            {isStudentChoice&&!isCorrectOpt&&<span style={{marginRight:"auto",fontSize:12,fontWeight:800,color:"#dc2626"}}>✗ اخترتها</span>}
                          </div>
                        );
                      })}
                    </div>
                    {notAnswered&&<p style={{fontSize:12,color:"#94a3b8",marginTop:8,fontWeight:600}}>⬜ لم تجب على هذا السؤال — الإجابة الصحيحة: <strong style={{color:"#166534"}}>{q.options[Number(q.correct)]}</strong></p>}
                    {/* Teacher feedback */}
                    {q.feedback&&q.feedback.trim()&&q.feedback!=="<br>"&&(
                      <div style={{marginTop:12,padding:"12px 14px",background:"linear-gradient(135deg,#f5f3ff,#ede9fe)",borderRadius:10,border:"2px solid #c4b5fd"}}>
                        <p style={{fontSize:12,fontWeight:800,color:"#7c3aed",marginBottom:6}}>💡 شرح المعلم:</p>
                        <div style={{fontSize:13,color:"#4c1d95",lineHeight:1.8,fontFamily:"Tajawal"}} dangerouslySetInnerHTML={{__html:q.feedback}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <button className="btn btn-blue" style={{width:"100%",padding:"13px",fontSize:16,marginTop:8}} onClick={onBack}>العودة للرئيسية 🏠</button>
      </div>
    );
  }

  return (
    <div>
      {/* Student level card - prominent */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",borderRadius:18,padding:"24px 20px",marginBottom:16,textAlign:"center",boxShadow:"0 8px 28px rgba(30,58,138,.3)"}}>
        <p style={{color:"#93c5fd",fontSize:13,marginBottom:6}}>{examTitle}</p>
        <p style={{color:"white",fontSize:18,fontWeight:900,marginBottom:18}}>{student.name} &nbsp;•&nbsp; الفصل {student.cls}</p>
        <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:"rgba(255,255,255,.12)",borderRadius:16,padding:"18px 32px",marginBottom:16}}>
          <p style={{color:"#93c5fd",fontSize:13,marginBottom:4}}>مجموع درجاتك</p>
          <div style={{fontSize:72,fontWeight:900,color:"white",lineHeight:1}}>{total}</div>
          <p style={{color:"#93c5fd",fontSize:14,marginTop:4}}>من {maxTotal} درجة</p>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:12,flexWrap:"wrap"}}>
          <div style={{background:g.bg,borderRadius:12,padding:"10px 20px",textAlign:"center"}}>
            <p style={{fontSize:11,color:g.color,fontWeight:700,marginBottom:2}}>مستواك</p>
            <p style={{fontSize:22,fontWeight:900,color:g.color}}>{g.label}</p>
          </div>
          <div style={{background:"rgba(255,255,255,.15)",borderRadius:12,padding:"10px 20px",textAlign:"center"}}>
            <p style={{fontSize:11,color:"#93c5fd",fontWeight:700,marginBottom:2}}>النسبة المئوية</p>
            <p style={{fontSize:22,fontWeight:900,color:"#fbbf24"}}>{pct}%</p>
          </div>
        </div>
      </div>

      {/* Badges */}
      {badges.length>0&&(
        <div className="card fade-in" style={{marginBottom:14,padding:"14px 18px"}}>
          <p style={{fontWeight:800,fontSize:14,color:"#1e293b",marginBottom:10}}>🏆 شاراتك في هذا الاختبار</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {badges.map((b,i)=>(
              <div key={i} className="badge-pop" style={{background:b.bg,border:`2px solid ${b.color}40`,borderRadius:12,padding:"8px 14px",display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:22}}>{b.icon}</span>
                <span style={{fontSize:13,fontWeight:800,color:b.color}}>{b.label}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <h3 style={{fontWeight:800,fontSize:16,marginBottom:12,color:"#1e293b"}}>النتائج حسب المادة</h3>
      <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:16}}>
        {Object.entries(subjectScores).map(([name,{score,maxScore}])=>{
          if(!maxScore) return null;
          const sp=Math.round(score/maxScore*100);
          const sg=gradeInfo(sp);
          return (
            <div key={name} className="card" style={{padding:"13px 17px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <span style={{fontWeight:700,fontSize:15,color:"#334155"}}>{name}</span>
                <div style={{textAlign:"left"}}>
                  <span style={{fontWeight:900,fontSize:17,color:sg.color}}>{score} / {maxScore}</span>
                  <span className="badge" style={{background:sg.bg,color:sg.color,marginRight:8}}>{sg.label}</span>
                </div>
              </div>
              <div className="pbar"><div className="pfill" style={{width:`${sp}%`,background:sg.color}}/></div>
            </div>
          );
        })}
      </div>

      {/* Feedback button */}
      <div className="card" style={{marginBottom:14,background:"linear-gradient(135deg,#fef3c7,#fffbeb)",border:"2px solid #fbbf24",padding:"16px 18px",textAlign:"center"}}>
        <p style={{fontSize:14,color:"#92400e",fontWeight:700,marginBottom:10}}>💡 هل تريد معرفة الإجابات الصحيحة؟</p>
        <button className="btn" style={{background:"#d97706",color:"white",border:"none",borderRadius:10,padding:"11px 28px",fontSize:15,fontWeight:800}} onClick={()=>setShowFeedback(true)}>
          📖 عرض التغذية الراجعة
        </button>
      </div>

      <button className="btn btn-blue" style={{width:"100%",padding:"13px",fontSize:16}} onClick={onBack}>العودة للرئيسية 🏠</button>
    </div>
  );
}

/* ─── ADMIN PANEL ─── */
function AdminPanel({exams,allResults,onNewExam,showNewExam,newTitle,setNewTitle,newTimer,setNewTimer,newPractice,setNewPractice,newPublishAt,setNewPublishAt,onCreateExam,onCancelNew,onEditExam,onDeleteExam,onViewResults,onAIImport,adminPass,apiKey,onChangePass,onChangeApiKey}){
  const [showSettings,setShowSettings]=useState(false);
  const [newPass,setNewPass]=useState("");
  const [newKey,setNewKey]=useState(null); // null = not yet touched
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:22,fontWeight:900,color:"#1e3a8a"}}>⚙️ لوحة التحكم</h2>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-ghost" style={{fontSize:13}} onClick={()=>setShowSettings(!showSettings)}>🔑 الإعدادات</button>
          <button className="btn" style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"white",border:"none",borderRadius:10,padding:"9px 16px",fontSize:13,fontWeight:700}} onClick={onAIImport}>
            🤖 استيراد ذكي PDF
          </button>
          <button className="btn btn-ghost" style={{fontSize:13}} onClick={onViewResults}>
            📊 نتائج الطلاب
            <span className="badge" style={{background:"#dbeafe",color:"#1d4ed8",marginRight:6}}>{allResults.length}</span>
          </button>
        </div>
      </div>

      {showSettings&&(
        <div className="card" style={{marginBottom:14,background:"#fffbeb",border:"2px solid #fde68a"}}>
          <p style={{fontWeight:800,marginBottom:12,color:"#92400e"}}>⚙️ الإعدادات</p>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"#92400e",display:"block",marginBottom:5}}>🔑 كلمة مرور المعلم</label>
            <div style={{display:"flex",gap:8}}>
              <input className="inp" type="password" placeholder="كلمة المرور الجديدة" value={newPass} onChange={e=>setNewPass(e.target.value)} style={{flex:1}}/>
              <button className="btn btn-blue" style={{padding:"10px 18px"}} onClick={()=>{if(newPass.trim()){onChangePass(newPass.trim());setNewPass("");alert("تم تغيير كلمة المرور")}}}>حفظ</button>
            </div>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:700,color:"#92400e",display:"block",marginBottom:5}}>🤖 مفتاح Claude AI (للاستيراد الذكي)</label>
            <div style={{display:"flex",gap:8}}>
              <input className="inp" type="text" placeholder="sk-ant-api03-..." value={newKey!==null?newKey:apiKey} onChange={e=>setNewKey(e.target.value)} style={{flex:1,fontSize:12,direction:"ltr",textAlign:"left"}}/>
              <button className="btn btn-blue" style={{padding:"10px 18px",whiteSpace:"nowrap"}} onClick={()=>{const k=(newKey!==null?newKey:apiKey).trim();onChangeApiKey(k);setNewKey(null);alert(k?"✅ تم حفظ مفتاح AI":"تم مسح المفتاح");}}>حفظ</button>
            </div>
            <p style={{fontSize:11,color:"#78350f",marginTop:5}}>احصل على المفتاح من: console.anthropic.com &nbsp;•&nbsp; {apiKey?"✅ محفوظ":"❌ غير محفوظ"}</p>
          </div>
        </div>
      )}

      {exams.length===0&&!showNewExam&&(
        <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:42,marginBottom:12}}>
          <p style={{fontSize:34,marginBottom:8}}>📝</p>
          <p style={{fontSize:15}}>لا توجد اختبارات بعد</p>
          <p style={{fontSize:12,marginTop:4}}>اضغط الزر أدناه لإنشاء أول اختبار</p>
        </div>
      )}

      {exams.map((exam,i)=>{
        const totalQ=exam.subjects.reduce((a,s)=>a+s.questions.length,0);
        const totalG=exam.subjects.reduce((a,s)=>a+s.questions.reduce((b,q)=>b+(Number(q.grade)||0),0),0);
        const examResults=allResults.filter(r=>r.examId===exam.id);

        // Check completeness
        const hasNoQuestions=totalQ===0;
        const missingAnswers=exam.subjects.some(s=>s.questions.some(q=>
          !q.options[Number(q.correct)]||q.options.filter(o=>o.trim()).length<2
        ));
        const missingOptions=exam.subjects.some(s=>s.questions.some(q=>
          q.options.filter(o=>o&&o.trim()).length<2
        ));
        const isIncomplete=hasNoQuestions||missingAnswers||missingOptions;

        return (
          <div key={exam.id} className="card" style={{marginBottom:10,padding:"15px 17px",border:isIncomplete?"2px solid #fbbf24":"2px solid transparent"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <p style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{exam.title}</p>
                <div style={{display:"flex",gap:8,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#64748b"}}>{exam.subjects.length} مواد</span>
                  <span style={{fontSize:12,color:"#64748b"}}>•</span>
                  <span style={{fontSize:12,color:"#64748b"}}>{totalQ} سؤال</span>
                  <span style={{fontSize:12,color:"#64748b"}}>•</span>
                  <span style={{fontSize:12,color:"#64748b"}}>{totalG} درجة</span>
                  {examResults.length>0&&<><span style={{fontSize:12,color:"#64748b"}}>•</span><span style={{fontSize:12,color:"#2563eb",fontWeight:700}}>{examResults.length} طالب أجاب</span></>}
                </div>
                {/* Warning badges */}
                {isIncomplete&&(
                  <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                    {hasNoQuestions&&<span style={{fontSize:11,fontWeight:700,background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px"}}>⚠️ لا توجد أسئلة — لن يظهر للطلاب</span>}
                    {!hasNoQuestions&&missingOptions&&<span style={{fontSize:11,fontWeight:700,background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px"}}>⚠️ بعض الأسئلة تفتقر لخيارات كافية</span>}
                    {!hasNoQuestions&&!missingOptions&&missingAnswers&&<span style={{fontSize:11,fontWeight:700,background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a",borderRadius:6,padding:"3px 8px"}}>⚠️ بعض الإجابات الصحيحة غير محددة</span>}
                  </div>
                )}
                {!isIncomplete&&totalQ>0&&(
                  <span style={{fontSize:11,fontWeight:700,background:"#dcfce7",color:"#166534",border:"1px solid #86efac",borderRadius:6,padding:"3px 8px",marginTop:8,display:"inline-block"}}>✅ مكتمل — متاح للطلاب</span>
                )}
              </div>
              <div style={{display:"flex",gap:7,marginRight:10}}>
                <button className="btn btn-blue" style={{padding:"7px 14px",fontSize:13}} onClick={()=>onEditExam(exam.id)}>✏️ تعديل</button>
                <button className="btn" style={{background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:8,padding:"7px 11px",fontSize:16}}
                  onClick={()=>{if(window.confirm(`هل تريد حذف اختبار "${exam.title}"؟\nلا يمكن التراجع عن هذا الإجراء.`)) onDeleteExam(exam.id);}}>🗑</button>
              </div>
            </div>
          </div>
        );
      })}

      {!showNewExam?(
        <button className="btn btn-blue" style={{width:"100%",marginTop:8,padding:"13px",fontSize:16}} onClick={onNewExam}>
          + إضافة اختبار جديد
        </button>
      ):(
        <div className="card" style={{marginTop:12,border:"2px solid #2563eb"}}>
          <p style={{fontWeight:800,marginBottom:14,color:"#1e3a8a",fontSize:16}}>📝 إنشاء اختبار جديد</p>
          <input className="inp" placeholder="عنوان الاختبار — مثال: اختبار الأحد ٢ مارس" value={newTitle} onChange={e=>setNewTitle(e.target.value)} style={{marginBottom:12}} onKeyDown={e=>e.key==="Enter"&&onCreateExam()} />

          {/* Timer */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
            <span style={{fontSize:18}}>⏱️</span>
            <div style={{flex:1}}>
              <p style={{fontSize:13,fontWeight:800,color:"#334155"}}>مؤقت الاختبار</p>
              <p style={{fontSize:11,color:"#94a3b8"}}>0 = بلا مؤقت</p>
            </div>
            <input type="number" className="inp" min={0} max={180} value={newTimer} onChange={e=>setNewTimer(Number(e.target.value))} style={{width:80,textAlign:"center",padding:"7px 10px"}}/>
            <span style={{fontSize:13,color:"#64748b",fontWeight:700}}>دقيقة</span>
          </div>

          {/* Practice mode */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",cursor:"pointer"}} onClick={()=>setNewPractice(!newPractice)}>
            <span style={{fontSize:18}}>🎯</span>
            <div style={{flex:1}}>
              <p style={{fontSize:13,fontWeight:800,color:"#334155"}}>وضع التدريب</p>
              <p style={{fontSize:11,color:"#94a3b8"}}>يظهر الإجابة الصحيحة فور اختيار الطالب</p>
            </div>
            <div style={{width:44,height:24,borderRadius:12,background:newPractice?"#2563eb":"#cbd5e1",transition:"all .2s",position:"relative",flexShrink:0}}>
              <div style={{position:"absolute",top:2,right:newPractice?2:20,width:20,height:20,borderRadius:"50%",background:"white",transition:"all .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
            </div>
          </div>

          {/* Scheduled publish */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 14px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
            <span style={{fontSize:18}}>📅</span>
            <div style={{flex:1}}>
              <p style={{fontSize:13,fontWeight:800,color:"#334155"}}>موعد النشر</p>
              <p style={{fontSize:11,color:"#94a3b8"}}>اتركه فارغاً للنشر الفوري</p>
            </div>
            <input type="datetime-local" className="inp" value={newPublishAt} onChange={e=>setNewPublishAt(e.target.value)} style={{width:190,fontSize:12,padding:"7px 10px"}}/>
          </div>

          <p style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>📌 عدد الطلاب: 140 • سيتم إنشاء 4 مواد تلقائياً</p>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-blue" style={{flex:1}} onClick={onCreateExam}>إنشاء وبدء التعديل ✓</button>
            <button className="btn btn-ghost" onClick={onCancelNew}>إلغاء</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── EDITOR SCREEN ─── */
function EditorScreen({exam,subjectIdx,setSubjectIdx,onUpdateTitle,onAddQ,onUpdateQ,onUpdateOpt,onDeleteQ,onUploadImg,onBack}){
  const [titleVal,setTitleVal]=useState(exam.title);
  const [pasteTargetId,setPasteTargetId]=useState(null);
  const fileRefs=useRef({});
  const currentSub=exam.subjects[subjectIdx];

  // Global paste listener
  useEffect(()=>{
    const handler=(e)=>{
      if(!pasteTargetId) return;
      const item=Array.from(e.clipboardData.items).find(i=>i.type.startsWith("image/"));
      if(item){ const file=item.getAsFile(); if(file) onUploadImg(pasteTargetId,file); }
    };
    document.addEventListener("paste",handler);
    return ()=>document.removeEventListener("paste",handler);
  },[pasteTargetId]);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,flexWrap:"wrap"}}>
        <button className="btn btn-ghost" onClick={onBack}>→ رجوع</button>
        <input style={{flex:1,minWidth:200,padding:"9px 14px",border:"2px solid #e2e8f0",borderRadius:10,fontFamily:"Tajawal",fontSize:16,fontWeight:800,color:"#1e3a8a",outline:"none"}}
          value={titleVal} onChange={e=>setTitleVal(e.target.value)} onBlur={()=>onUpdateTitle(titleVal)} placeholder="عنوان الاختبار"/>
      </div>

      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {exam.subjects.map((s,idx)=>(
          <button key={idx} className={`tab ${idx===subjectIdx?"on":""}`} onClick={()=>setSubjectIdx(idx)}>
            {s.name}
            <span style={{opacity:.7,fontSize:11,marginRight:4}}>({s.questions.length})</span>
          </button>
        ))}
      </div>

      {currentSub.questions.length===0&&(
        <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:36,marginBottom:14}}>
          <p style={{fontSize:28,marginBottom:6}}>❓</p>
          <p>لا توجد أسئلة في {currentSub.name} بعد</p>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {currentSub.questions.map((q,qi)=>(
          <div key={q.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>

                  <span style={{fontSize:14,fontWeight:800,color:Number(q.correct)===oi?"#166534":"#94a3b8",minWidth:20}}>{["أ","ب","ج","د"][oi]}</span>
                  <input className="inp" style={{flex:1,padding:"9px 12px",border:`2px solid ${Number(q.correct)===oi?"#86efac":"#e2e8f0"}`}}

            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>

              <input className="inp" type="number" value={q.grade} onChange={e=>onUpdateQ(q.id,"grade",Number(e.target.value))} style={{width:70,padding:"7px 10px"}} min={1} max={20}/>

                <span style={{fontSize:13,color:"#166534",fontWeight:700}}>✓ الصحيحة: {q.options[Number(q.correct)]}</span>

                <div style={{width:1,background:"#e2e8f0",margin:"2px 3px"}}/>

                  <button key={sz} onMouseDown={e=>{e.preventDefault();document.execCommand("fontSize",false,"3");const sel=window.getSelection();if(sel.rangeCount){const els=document.querySelectorAll(`#fb-${q.id} font[size="3"]`);els.forEach(el=>{el.removeAttribute("size");el.style.fontSize=sz;});}}}
                    style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"white",cursor:"pointer",fontSize:lbl==="صـ"?13:lbl==="ص"?11:9,fontWeight:700,fontFamily:"Tajawal"}}>
                    {lbl}

                ))}
                <div style={{width:1,background:"#e2e8f0",margin:"2px 3px"}}/>
                <label title="إضافة صورة للتغذية الراجعة" style={{width:28,height:28,border:"1px solid #e2e8f0",borderRadius:6,background:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                  🖼
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                    const file=e.target.files[0]; if(!file) return;
                    const r=new FileReader();
                    r.onload=ev=>{document.execCommand("insertHTML",false,`<img src="${ev.target.result}" style="max-width:100%;border-radius:8px;margin:4px 0"/>`);}

              </div>
              <div
                id={`fb-${q.id}`}

                placeholder="اكتب شرحاً للإجابة الصحيحة..."
              />
            </div>
          </div>
        ))}
      </div>

      <button className="btn btn-blue" style={{width:"100%",marginTop:16,padding:"13px",fontSize:16}} onClick={onAddQ}>
        + إضافة سؤال في {currentSub.name}
      </button>
    </div>
  );
}

/* ─── CHART COMPONENT ─── */
function ChartBar({data,labels,colors,title,unit}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    const ctx=ref.current.getContext("2d");
    const ch=new Chart(ctx,{
      type:"bar",
      data:{labels,datasets:[{label:title,data,backgroundColor:colors,borderColor:colors,borderWidth:2,borderRadius:8}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.raw}${unit||""}`}}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>`${v}${unit||""}`},grid:{color:"rgba(0,0,0,.05)"}},x:{grid:{display:false}}}}
    });
    return ()=>ch.destroy();
  },[]);
  return <canvas ref={ref} style={{maxHeight:220}}/>;
}

function ChartDoughnut({data,labels,colors,title}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    const ctx=ref.current.getContext("2d");
    const ch=new Chart(ctx,{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:3,borderColor:"white"}]},
      options:{responsive:true,cutout:"65%",plugins:{legend:{position:"bottom",labels:{font:{family:"Tajawal",size:12},padding:12}},tooltip:{callbacks:{label:v=>`${v.label}: ${v.raw} طالب`}}}}
    });
    return ()=>ch.destroy();
  },[]);
  return <canvas ref={ref} style={{maxHeight:240}}/>;
}

function ChartLine({data,labels,title}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    const ctx=ref.current.getContext("2d");
    const ch=new Chart(ctx,{
      type:"line",
      data:{labels,datasets:[{label:title,data,borderColor:"#2563eb",backgroundColor:"rgba(37,99,235,.1)",borderWidth:3,pointBackgroundColor:"#2563eb",pointRadius:5,fill:true,tension:.4}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:v=>`${v}%`},grid:{color:"rgba(0,0,0,.05)"}},x:{grid:{display:false}}}}
    });
    return ()=>ch.destroy();
  },[]);
  return <canvas ref={ref} style={{maxHeight:200}}/>;
}

/* ─── ALL RESULTS ─── */
function AllResultsScreen({results,exams,onClearResults,onBack}){
  const [filter,setFilter]=useState("all");
  const [tab,setTab]=useState("charts");
  const titles=[...new Set(results.map(r=>r.examTitle))];
  const filtered=filter==="all"?results:results.filter(r=>r.examTitle===filter);
  const sorted=[...filtered].reverse();
  const avgScore=filtered.length?(filtered.reduce((a,r)=>a+(r.res.maxTotal?r.res.total/r.res.maxTotal*100:0),0)/filtered.length).toFixed(1):0;

  const subjectStats={};
  filtered.forEach(r=>{
    Object.entries(r.res.subjectScores).forEach(([name,{score,maxScore}])=>{
      if(!maxScore) return;
      if(!subjectStats[name]) subjectStats[name]={total:0,max:0,count:0};
      subjectStats[name].total+=score; subjectStats[name].max+=maxScore; subjectStats[name].count+=1;
    });
  });

  const levels={ممتاز:0,"جيد جداً":0,جيد:0,مقبول:0,ضعيف:0};
  filtered.forEach(r=>{
    const pct=r.res.maxTotal?Math.round(r.res.total/r.res.maxTotal*100):0;
    const lbl=gradeInfo(pct).label;
    levels[lbl]=(levels[lbl]||0)+1;
  });

  const totalStudents=140;
  const coveragePct=((filtered.length/totalStudents)*100).toFixed(1);
  const byScore=[...filtered].sort((a,b)=>(b.res.maxTotal?b.res.total/b.res.maxTotal:0)-(a.res.maxTotal?a.res.total/a.res.maxTotal:0));
  const topStudent=byScore[0];
  const bottomStudent=byScore[byScore.length-1];

  // Score distribution buckets
  const buckets={"0-49":0,"50-59":0,"60-69":0,"70-79":0,"80-89":0,"90-100":0};
  filtered.forEach(r=>{
    const p=r.res.maxTotal?Math.round(r.res.total/r.res.maxTotal*100):0;
    if(p<50) buckets["0-49"]++;
    else if(p<60) buckets["50-59"]++;
    else if(p<70) buckets["60-69"]++;
    else if(p<80) buckets["70-79"]++;
    else if(p<90) buckets["80-89"]++;
    else buckets["90-100"]++;
  });

  const subNames=Object.keys(subjectStats);
  const subPcts=subNames.map(n=>subjectStats[n].max?Math.round(subjectStats[n].total/subjectStats[n].max*100):0);
  const subColors=["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4"];

  const now=new Date().toLocaleDateString("ar-SA-u-ca-islamic",{year:"numeric",month:"long",day:"numeric"});

  const handlePrint=()=>window.print();

  return (
    <div id="analytics-page">
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:14,padding:"16px 20px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div>
          <p style={{color:"#fbbf24",fontSize:13,fontWeight:900}}>مدرسة عبيدة بن الحارث المتوسطة</p>
          <p style={{color:"white",fontSize:17,fontWeight:900,marginTop:3}}>📊 لوحة التحليل الإحصائي</p>
          <p style={{color:"#93c5fd",fontSize:12,marginTop:2}}>{now}</p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}} className="no-print">
          <button className="btn btn-ghost" onClick={onBack}>→ رجوع</button>
          <button className="btn" style={{background:"#16a34a",color:"white",border:"none",borderRadius:9,padding:"9px 16px",fontSize:13,fontWeight:700}} onClick={handlePrint}>🖨️ طباعة التقرير</button>
          {results.length>0&&<button className="btn" style={{background:"#16a34a",color:"white",border:"none",borderRadius:9,padding:"9px 16px",fontSize:13,fontWeight:700}} onClick={()=>{
            const rows=[["الاسم","رقم الطالب","الفصل","الاختبار","الدرجة","المجموع","النسبة%","المستوى","التاريخ"]];
            filtered.forEach(r=>{
              const pct=r.res.maxTotal?Math.round(r.res.total/r.res.maxTotal*100):0;
              rows.push([r.name,r.number,r.cls,r.examTitle,r.res.total,r.res.maxTotal,pct+"%",gradeInfo(pct).label,new Date(r.ts).toLocaleDateString("ar-SA")]);
            });
            const csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");
            const a=document.createElement("a");
            a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
            a.download=`نتائج_${filter==="all"?"جميع_الاختبارات":filter}_${new Date().toLocaleDateString("ar-SA").replace(/\//g,"-")}.csv`;
            a.click();
          }}>📥 تصدير Excel</button>}
          {results.length>0&&<button className="btn" style={{background:"#fef2f2",color:"#ef4444",border:"2px solid #fecaca",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700}} onClick={()=>{if(window.confirm(`هل تريد حذف جميع النتائج (${results.length} نتيجة)؟\nلا يمكن التراجع عن هذا الإجراء.`)) onClearResults();}}>🗑 حذف الكل</button>}
        </div>
      </div>

      {/* Filter */}
      {titles.length>1&&(
        <select className="inp" style={{marginBottom:12}} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">جميع الاختبارات</option>
          {titles.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      )}

      {/* Tabs */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}} className="no-print">
        {[["charts","📊 الرسوم البيانية"],["stats","📈 الإحصائيات"],["students","👥 قائمة الطلاب"]].map(([k,label])=>(
          <button key={k} className={`tab ${tab===k?"on":""}`} onClick={()=>setTab(k)}>{label}</button>
        ))}
      </div>

      {filtered.length===0 ? (
        <div className="card" style={{textAlign:"center",color:"#94a3b8",padding:52}}>
          <p style={{fontSize:36,marginBottom:10}}>📭</p>
          <p style={{fontSize:15}}>لا توجد نتائج بعد</p>
        </div>
      ) : (<div>

      {/* ── CHARTS TAB ── */}
      {(tab==="charts") && (<div>

        {/* KPI row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
          {[
            ["👥","المختبرون",filtered.length,"طالب","#1d4ed8","#dbeafe"],
            ["📊","المتوسط العام",`${avgScore}%`,"","#166534","#dcfce7"],
            ["🎯","نسبة التغطية",`${coveragePct}%`,`من ${totalStudents}`,"#d97706","#fef3c7"],
            ["🏅","المستوى العام",gradeInfo(Number(avgScore)).label,"","#6b21a8","#f3e8ff"],
          ].map(([icon,label,val,sub,color,bg],i)=>(
            <div key={i} style={{background:bg,borderRadius:12,padding:"14px 12px",textAlign:"center",border:`2px solid ${color}20`}}>
              <p style={{fontSize:22}}>{icon}</p>
              <p style={{fontSize:11,color:"#64748b",fontWeight:700,marginTop:4}}>{label}</p>
              <p style={{fontSize:20,fontWeight:900,color,marginTop:2}}>{val}</p>
              {sub&&<p style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{sub}</p>}
            </div>
          ))}
        </div>

        {/* Bar chart - subject averages */}
        {subNames.length>0&&(
          <div className="card" style={{marginBottom:14,padding:"16px 18px"}}>
            <p style={{fontWeight:900,fontSize:15,color:"#1e3a8a",marginBottom:14}}>📚 متوسط الدرجات لكل مادة</p>
            <ChartBar key={`bar-${filter}`} data={subPcts} labels={subNames} colors={subColors.slice(0,subNames.length)} title="المتوسط%" unit="%"/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:12}}>
              {subNames.map((n,i)=>{
                const pct=subPcts[i];
                const g=gradeInfo(pct);
                return <span key={n} className="badge" style={{background:g.bg,color:g.color,fontSize:12}}>{n}: {pct}% — {g.label}</span>;
              })}
            </div>
          </div>
        )}

        {/* Doughnut - levels */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div className="card" style={{padding:"16px 18px"}}>
            <p style={{fontWeight:900,fontSize:14,color:"#1e3a8a",marginBottom:12}}>🏅 توزيع المستويات</p>
            <ChartDoughnut key={`donut-${filter}`}
              data={[levels["ممتاز"],levels["جيد جداً"],levels["جيد"],levels["مقبول"],levels["ضعيف"]]}
              labels={["ممتاز","جيد جداً","جيد","مقبول","ضعيف"]}
              colors={["#166534","#1e40af","#6b21a8","#9a3412","#991b1b"]}
              title="المستويات"/>
          </div>
          <div className="card" style={{padding:"16px 18px"}}>
            <p style={{fontWeight:900,fontSize:14,color:"#1e3a8a",marginBottom:12}}>📉 توزيع الدرجات</p>
            <ChartBar key={`dist-${filter}`}
              data={Object.values(buckets)}
              labels={Object.keys(buckets)}
              colors={["#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#166534"]}
              title="عدد الطلاب" unit=" طالب"/>
          </div>
        </div>

        {/* Score trend if multiple exams */}
        {titles.length>1&&filter==="all"&&(
          <div className="card" style={{marginBottom:14,padding:"16px 18px"}}>
            <p style={{fontWeight:900,fontSize:14,color:"#1e3a8a",marginBottom:12}}>📈 تطور المتوسط عبر الاختبارات</p>
            <ChartLine key="line"
              data={titles.map(t=>{
                const tr=results.filter(r=>r.examTitle===t);
                return tr.length?(tr.reduce((a,r)=>a+(r.res.maxTotal?r.res.total/r.res.maxTotal*100:0),0)/tr.length).toFixed(1):0;
              })}
              labels={titles}
              title="المتوسط%"/>
          </div>
        )}

        {/* Top & bottom */}
        {filtered.length>1&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
            {topStudent&&(
              <div className="card" style={{padding:"16px",border:"2px solid #166534",background:"#f0fdf4"}}>
                <p style={{fontSize:12,color:"#166534",fontWeight:800,marginBottom:8}}>🥇 الأعلى درجة</p>

/* ─── PASTE IMAGE BOX (per-question) ─── */
function PasteImageBox({image, onChange}){
  const [active,setActive]=useState(false);
  const boxRef=useRef(null);

  // Handle paste from clipboard
  useEffect(()=>{
    const onPaste=(e)=>{
      if(!active) return;
      const items=e.clipboardData?.items||[];
      for(const item of items){
        if(item.type.startsWith("image/")){
          const file=item.getAsFile();
          if(file){
            const reader=new FileReader();
            reader.onload=ev=>onChange(ev.target.result);
            reader.readAsDataURL(file);
          }
        }
      }
    };
    document.addEventListener("paste",onPaste);
    return ()=>document.removeEventListener("paste",onPaste);
  },[active]);

  // Handle drag & drop
  const onDragOver=(e)=>{e.preventDefault();};
  const onDrop=(e)=>{
    e.preventDefault();
    const file=e.dataTransfer.files[0];
    if(file&&file.type.startsWith("image/")){
      const reader=new FileReader();
      reader.onload=ev=>onChange(ev.target.result);
      reader.readAsDataURL(file);
    }
    // also handle dragged image elements (e.g. from browser)
    const url=e.dataTransfer.getData("text/html");
    if(!file && url){
      const m=url.match(/src="([^"]+)"/);
      if(m) onChange(m[1]);
    }
  };

  return (
    <div style={{marginTop:10}}>
      {image?(
        <div style={{position:"relative"}}>
          <img src={image} alt="صورة السؤال" style={{width:"100%",maxHeight:200,objectFit:"contain",borderRadius:10,border:"2px solid #7c3aed",background:"#f5f3ff",display:"block"}}/>
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <button
              onClick={()=>{setActive(true);setTimeout(()=>boxRef.current?.focus(),50);}}
              style={{flex:1,background:"#eff6ff",color:"#1d4ed8",border:"2px solid #bfdbfe",borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Tajawal"}}>
              🔄 استبدال (Ctrl+V)
            </button>
            <button
              onClick={()=>onChange(null)}
              style={{background:"#fef2f2",color:"#ef4444",border:"2px solid #fca5a5",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"Tajawal"}}>
              ✕
            </button>
          </div>
        </div>
      ):(
        <div
          ref={boxRef}
          tabIndex={0}
          onClick={()=>setActive(true)}
          onBlur={()=>setActive(false)}
          onDragOver={onDragOver}
          onDrop={onDrop}
          style={{
            border:`2px dashed ${active?"#2563eb":"#e2e8f0"}`,
            borderRadius:10,
            background:active?"#eff6ff":"#fafafa",
            padding:"14px 16px",
            display:"flex",
            alignItems:"center",
            gap:12,
            cursor:"pointer",
            transition:"all .2s",
            outline:"none",
            boxShadow:active?"0 0 0 3px rgba(37,99,235,.15)":"none"
          }}>
          <div style={{
            width:40,height:40,borderRadius:9,
            background:active?"#2563eb":"#e2e8f0",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:20,flexShrink:0,transition:"all .2s"
          }}>📋</div>
          <div>
            <p style={{fontSize:13,fontWeight:700,color:active?"#1d4ed8":"#64748b",marginBottom:2}}>
              {active?"✅ جاهز — الصق الصورة الآن (Ctrl+V)":"انقر ثم الصق صورة أو أفلتها هنا"}
            </p>
            <p style={{fontSize:11,color:"#94a3b8"}}>اقص صورة من PDF ← Ctrl+V ← تظهر هنا</p>
          </div>
          {active&&<div style={{marginRight:"auto",width:10,height:10,borderRadius:"50%",background:"#2563eb",animation:"pulse .8s infinite"}}/>}
        </div>
      )}
    </div>
  );
}
