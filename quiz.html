      title:examTitle||"اختبار مستورد",
      totalStudents:140,
      createdAt:new Date().toISOString(),
      timerMinutes:timerMins,
      isPractice,
      publishAt:null,
      isStandardsBased:true,
      standards:standards,
      subjects:[{name:"الأسئلة",questions:standards.flatMap(s=>s.questions.map(q=>({...q,standardName:s.name})))}]
    };
    onSaveExam(exam);
  };

  return (
    <div>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",borderRadius:14,padding:"16px 20px",marginBottom:18,display:"flex",alignItems:"center",gap:12}}>
        <button className="btn" style={{background:"rgba(255,255,255,.2)",color:"white",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13}} onClick={onBack}>→ رجوع</button>
        <div>
          <p style={{color:"#e9d5ff",fontSize:12,fontWeight:700}}>الاستيراد الذكي بالذكاء الاصطناعي</p>
          <p style={{color:"white",fontSize:17,fontWeight:900}}>🤖 استيراد PDF المعايير</p>
        </div>
      </div>

      {!apiKey&&(
        <div className="card" style={{marginBottom:14,background:"#fef2f2",border:"2px solid #fca5a5",padding:"16px 18px"}}>
          <p style={{fontWeight:800,color:"#dc2626",marginBottom:6}}>⚠️ مفتاح AI غير موجود</p>
          <p style={{fontSize:13,color:"#64748b"}}>اذهب للوحة التحكم ← الإعدادات ← أضف مفتاح Claude AI</p>
        </div>
      )}

      {/* Step: Upload */}
      {step==="upload"&&(
        <div>
          <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{if(e.target.files[0])extractFromPDF(e.target.files[0]);}}/>
          {/* PDF upload */}
          <div className="card" style={{marginBottom:14,border:"2px dashed #c4b5fd",background:"#faf5ff",padding:"16px 18px"}}>
            <p style={{fontWeight:800,color:"#7c3aed",fontSize:14,marginBottom:10}}>📄 الطريقة ١: رفع PDF (استخراج تلقائي)</p>
            <button className="btn" style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"white",border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,fontWeight:800,width:"100%"}} onClick={()=>fileRef.current?.click()}>اختر ملف PDF 📂</button>
            {progress&&<p style={{fontSize:12,color:"#7c3aed",marginTop:8,textAlign:"center"}}>{progress}</p>}
          </div>
          {/* Text paste */}
          <div className="card" style={{marginBottom:14,border:"2px solid #e9d5ff",background:"#faf5ff",padding:"16px 18px"}}>
            <p style={{fontWeight:800,color:"#7c3aed",fontSize:14,marginBottom:8}}>📝 الطريقة ٢: لصق النص مباشرة (الأكثر دقة)</p>
            <p style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>افتح ملف PDF وانسخ كل النص ثم الصقه هنا</p>
            <textarea className="inp" value={pastedText} onChange={e=>setPastedText(e.target.value)}
              style={{minHeight:140,fontSize:13,marginBottom:10,direction:"rtl"}}
              placeholder="الصق نص الأسئلة والمعايير هنا..."/>
            <button className="btn btn-blue" style={{width:"100%",padding:"11px",fontSize:15,fontWeight:800}}
              onClick={()=>callClaudeAPI(pastedText)} disabled={!pastedText.trim()}>
              🤖 تحليل بالذكاء الاصطناعي
            </button>
          </div>
          {/* Method 3: 3 Image drop zones */}
          <div className="card" style={{marginBottom:14,border:"2px solid #7c3aed",background:"#faf5ff",padding:"16px 18px"}}>
            <p style={{fontWeight:800,color:"#7c3aed",fontSize:14,marginBottom:2}}>🖼️ الطريقة ٣: إفلات صور مقصوصة من PDF (حتى ٣ صور)</p>
            <p style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>اقص صفحات أو أجزاء من PDF وأفلتها — الذكاء الاصطناعي يفهم النصوص والرسومات والصور التوضيحية</p>

            {/* 3 drop slots */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
              {[0,1,2].map(idx=>{
                const slot=imgSlots[idx];
                const inputId=`imgSlot${idx}`;
                return (
                  <div key={idx}>
                    <p style={{fontSize:11,fontWeight:700,color:"#6b21a8",marginBottom:5,textAlign:"center"}}>
                      {["الصورة الأولى","الصورة الثانية","الصورة الثالثة"][idx]}
                      {slot&&<span style={{color:"#16a34a",marginRight:4}}>✓</span>}
                    </p>
                    <div
                      onDragOver={e=>{e.preventDefault();e.currentTarget.style.background="#ede9fe";e.currentTarget.style.borderColor="#6d28d9";}}
                      onDragLeave={e=>{e.currentTarget.style.background=slot?"#f0ebff":"#fdf8ff";e.currentTarget.style.borderColor=slot?"#7c3aed":"#c4b5fd";}}
                      onDrop={e=>{
                        e.preventDefault();
                        e.currentTarget.style.background=slot?"#f0ebff":"#fdf8ff";
                        e.currentTarget.style.borderColor=slot?"#7c3aed":"#c4b5fd";
                        const file=e.dataTransfer.files[0];
                        if(file&&file.type.startsWith("image/")) handleDroppedImageSlot(idx,file);
                      }}
                      onClick={()=>document.getElementById(inputId)?.click()}
                      style={{
                        border:`2px dashed ${slot?"#7c3aed":"#c4b5fd"}`,
                        borderRadius:10,
                        background:slot?"#f0ebff":"#fdf8ff",
                        minHeight:slot?0:100,
                        display:"flex",
                        flexDirection:"column",
                        alignItems:"center",
                        justifyContent:"center",
                        gap:6,
                        cursor:"pointer",
                        transition:"all .2s",
                        padding:slot?6:12,
                        position:"relative",
                        overflow:"hidden"
                      }}>
                      <input id={inputId} type="file" accept="image/*" style={{display:"none"}}
                        onChange={e=>{if(e.target.files[0])handleDroppedImageSlot(idx,e.target.files[0]);}}/>
                      {slot ? (
                        <div style={{position:"relative",width:"100%"}}>
                          <img src={slot.preview} style={{width:"100%",maxHeight:140,objectFit:"contain",borderRadius:7,display:"block"}} alt={`slot${idx}`}/>
                          <div
                            onMouseEnter={e=>e.currentTarget.style.opacity=1}
                            onMouseLeave={e=>e.currentTarget.style.opacity=0}
                            style={{position:"absolute",inset:0,background:"rgba(109,40,217,.6)",borderRadius:7,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,opacity:0,transition:"opacity .2s"}}>
                            <p style={{color:"white",fontWeight:800,fontSize:12}}>🔄 استبدال</p>
                            <button
                              onClick={e=>{e.stopPropagation();clearSlot(idx);}}
                              style={{background:"#ef4444",color:"white",border:"none",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"Tajawal"}}>
                              ✕ حذف
                            </button>
                          </div>
                        </div>
                      ):(
                        <>
                          <span style={{fontSize:30,animation:`float ${2.5+idx*0.3}s ease-in-out infinite`}}>🖼️</span>
                          <p style={{fontSize:11,fontWeight:700,color:"#7c3aed",textAlign:"center"}}>أفلت أو انقر</p>
                          <p style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>PNG • JPG • WEBP</p>
                        </>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* count badge */}
            {imgSlots.some(Boolean)&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 12px",background:"#f0ebff",borderRadius:8,border:"1px solid #e9d5ff"}}>
                <span style={{fontSize:13}}>🖼️</span>
                <p style={{fontSize:13,color:"#6b21a8",fontWeight:700,flex:1}}>
                  {imgSlots.filter(Boolean).length} صورة جاهزة للتحليل
                  {imgSlots.filter(Boolean).length<3&&<span style={{color:"#94a3b8",fontWeight:400}}> — يمكنك إضافة {3-imgSlots.filter(Boolean).length} أكثر</span>}
                </p>
                <span style={{fontSize:11,color:"#7c3aed",fontWeight:700,background:"white",padding:"2px 8px",borderRadius:5,border:"1px solid #c4b5fd"}}>
                  الذكاء يحلل النصوص والرسوم 🔍
                </span>
              </div>
            )}

            <button
              className="btn"
              style={{
                width:"100%",padding:"12px",fontSize:15,fontWeight:800,
                background:imgSlots.some(Boolean)?"linear-gradient(135deg,#7c3aed,#6d28d9)":"#e2e8f0",
                color:imgSlots.some(Boolean)?"white":"#94a3b8",
                border:"none",borderRadius:10,cursor:imgSlots.some(Boolean)?"pointer":"not-allowed",
                transition:"all .2s"
              }}
              disabled={!imgSlots.some(Boolean)}
              onClick={()=>callClaudeAPIWithImages()}>
              🤖 تحليل {imgSlots.filter(Boolean).length>0?`${imgSlots.filter(Boolean).length} صور`:"الصور"} بالذكاء الاصطناعي
            </button>
          </div>

          {error&&<div className="card" style={{background:"#fef2f2",border:"2px solid #fca5a5",padding:"12px 16px",marginBottom:10}}><p style={{color:"#dc2626",fontWeight:700}}>{error}</p></div>}
          <div className="card" style={{padding:"14px 18px",background:"#f5f3ff",border:"2px solid #e9d5ff"}}>
            <p style={{fontWeight:800,color:"#7c3aed",marginBottom:8,fontSize:14}}>📋 ماذا يفعل الاستيراد الذكي؟</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {["📌 يقرأ المعايير الدراسية من النص","❓ يستخرج الأسئلة مع 4 خيارات لكل سؤال","✅ يحدد الإجابات الصحيحة إذا كانت موجودة","✏️ يتيح لك التعديل قبل الحفظ","💾 يحفظ كاختبار جاهز مع تحليل النتائج"].map((t,i)=>(
                <p key={i} style={{fontSize:13,color:"#6b21a8",fontWeight:600}}>{t}</p>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Step: Extracting */}
      {step==="extracting"&&(
        <div className="card" style={{textAlign:"center",padding:52}}>
          <div style={{fontSize:52,marginBottom:16,animation:"pulse 1s infinite"}}>🤖</div>
          <p style={{fontSize:17,fontWeight:800,color:"#7c3aed",marginBottom:8}}>جارٍ التحليل...</p>
          <p style={{fontSize:14,color:"#94a3b8"}}>{progress}</p>
          <div style={{marginTop:20,height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",background:"linear-gradient(90deg,#7c3aed,#6d28d9)",borderRadius:3,animation:"pfill-anim 2s ease-in-out infinite",width:"60%"}}/>
          </div>
        </div>
      )}

      {/* Step: Review */}
      {step==="review"&&(
        <div>
          {/* Exam settings */}
          <div className="card" style={{marginBottom:14,border:"2px solid #7c3aed"}}>
            <p style={{fontWeight:900,color:"#7c3aed",fontSize:15,marginBottom:12}}>⚙️ إعدادات الاختبار</p>
            <input className="inp" value={examTitle} onChange={e=>setExamTitle(e.target.value)} style={{marginBottom:10}} placeholder="عنوان الاختبار"/>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:160}}>
                <span style={{fontSize:13,fontWeight:700,color:"#475569",whiteSpace:"nowrap"}}>⏱️ مؤقت:</span>
                <input type="number" className="inp" min={0} max={180} value={timerMins} onChange={e=>setTimerMins(Number(e.target.value))} style={{width:70,padding:"7px 10px"}}/>
                <span style={{fontSize:13,color:"#64748b"}}>دقيقة</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setIsPractice(!isPractice)}>
                <div style={{width:40,height:22,borderRadius:11,background:isPractice?"#7c3aed":"#cbd5e1",position:"relative",transition:"all .2s"}}>
                  <div style={{position:"absolute",top:2,right:isPractice?2:20,width:18,height:18,borderRadius:"50%",background:"white",transition:"all .2s"}}/>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>🎯 تدريبي</span>
              </div>
            </div>
          </div>

          {/* Summary */}
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <div className="card" style={{flex:1,minWidth:100,padding:"12px 16px",textAlign:"center",background:"#f5f3ff",border:"2px solid #e9d5ff"}}>
              <p style={{fontSize:28,fontWeight:900,color:"#7c3aed"}}>{standards.length}</p>
              <p style={{fontSize:12,color:"#6b21a8",fontWeight:700}}>معيار</p>
            </div>
            <div className="card" style={{flex:1,minWidth:100,padding:"12px 16px",textAlign:"center",background:"#eff6ff",border:"2px solid #bfdbfe"}}>
              <p style={{fontSize:28,fontWeight:900,color:"#2563eb"}}>{standards.reduce((a,s)=>a+s.questions.length,0)}</p>
              <p style={{fontSize:12,color:"#1d4ed8",fontWeight:700}}>سؤال</p>
            </div>
            <div className="card" style={{flex:1,minWidth:100,padding:"12px 16px",textAlign:"center",background:"#dcfce7",border:"2px solid #86efac"}}>
              <p style={{fontSize:28,fontWeight:900,color:"#166534"}}>{standards.reduce((a,s)=>a+s.questions.reduce((b,q)=>b+q.grade,0),0)}</p>
              <p style={{fontSize:12,color:"#166534",fontWeight:700}}>درجة</p>
            </div>
          </div>

          {/* Standards & Questions */}
          {standards.map((std,sIdx)=>(
            <div key={std.id} className="card" style={{marginBottom:16,border:"2px solid #e9d5ff"}}>
              {/* Standard header */}
              <div style={{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📌</span>
                <input value={std.name} onChange={e=>{const s=[...standards];s[sIdx]={...s[sIdx],name:e.target.value};setStandards(s);}}
                  style={{flex:1,background:"transparent",border:"none",color:"white",fontWeight:800,fontSize:14,fontFamily:"Tajawal",outline:"none"}}
                  placeholder="اسم المعيار"/>
                <button onClick={()=>deleteStandard(sIdx)} style={{background:"rgba(255,255,255,.2)",color:"white",border:"none",borderRadius:7,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"Tajawal"}}>حذف المعيار</button>
              </div>

              {/* Questions */}
              {std.questions.map((q,qIdx)=>(
                <div key={q.id} style={{marginBottom:14,padding:"12px 14px",background:"#fafafa",borderRadius:10,border:"1px solid #e2e8f0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:13,fontWeight:800,color:"#7c3aed"}}>سؤال {qIdx+1}</span>
                    <button onClick={()=>deleteQuestion(sIdx,qIdx)} style={{background:"#fef2f2",color:"#ef4444",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,cursor:"pointer",fontFamily:"Tajawal"}}>حذف</button>
                  </div>
                  <textarea className="inp" value={q.text} onChange={e=>updateQ(sIdx,qIdx,"text",e.target.value)}
                    style={{marginBottom:8,minHeight:50,fontSize:14}} placeholder="نص السؤال"/>

                  {/* Options */}
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
                    {q.options.map((opt,oi)=>(
                      <div key={oi} style={{display:"flex",alignItems:"center",gap:8}}>
                        <button onClick={()=>updateQ(sIdx,qIdx,"correct",oi)}
                          style={{width:28,height:28,borderRadius:"50%",border:`2.5px solid ${Number(q.correct)===oi?"#7c3aed":"#e2e8f0"}`,background:Number(q.correct)===oi?"#7c3aed":"white",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {Number(q.correct)===oi&&<span style={{color:"white",fontSize:13,fontWeight:900}}>✓</span>}
                        </button>
                        <span style={{fontSize:13,fontWeight:700,color:Number(q.correct)===oi?"#7c3aed":"#94a3b8",minWidth:20}}>{["أ","ب","ج","د"][oi]}</span>
                        <input className="inp" value={opt} onChange={e=>updateOpt(sIdx,qIdx,oi,e.target.value)}
                          style={{flex:1,padding:"7px 10px",border:`2px solid ${Number(q.correct)===oi?"#c4b5fd":"#e2e8f0"}`,fontSize:13}}
                          placeholder={`الخيار ${["أ","ب","ج","د"][oi]}`}/>
                      </div>
                    ))}
                  </div>

                  {/* Grade + Feedback */}
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                    <label style={{fontSize:12,fontWeight:700,color:"#475569"}}>الدرجة:</label>
                    <input type="number" className="inp" value={q.grade} min={1} max={20}
                      onChange={e=>updateQ(sIdx,qIdx,"grade",Number(e.target.value))}
                      style={{width:60,padding:"5px 8px",fontSize:13}}/>
                    {q.options[Number(q.correct)]&&<span style={{fontSize:12,color:"#7c3aed",fontWeight:700}}>✓ {q.options[Number(q.correct)]}</span>}
                  </div>
                  <input className="inp" value={q.feedback} onChange={e=>updateQ(sIdx,qIdx,"feedback",e.target.value)}
                    style={{fontSize:13,padding:"7px 12px"}} placeholder="💡 تغذية راجعة (اختياري)"/>

                  {/* Per-question image paste box */}
                  <div style={{marginTop:10}}>
                    <p style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:4}}>🖼️ صورة توضيحية للسؤال (اختياري)</p>
                    <PasteImageBox
                      image={q.image||null}
                      onChange={img=>updateQ(sIdx,qIdx,"image",img)}
                    />
                  </div>
                </div>
              ))}
              <button onClick={()=>addQuestion(sIdx)} className="btn" style={{width:"100%",background:"#f5f3ff",color:"#7c3aed",border:"2px dashed #c4b5fd",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700}}>
                + إضافة سؤال لهذا المعيار
              </button>
            </div>
          ))}

          <button onClick={addStandard} className="btn" style={{width:"100%",background:"#f5f3ff",color:"#7c3aed",border:"2px dashed #7c3aed",borderRadius:10,padding:"11px",fontSize:14,fontWeight:700,marginBottom:14}}>
            + إضافة معيار جديد
          </button>

          {/* Action buttons */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={saveAsExam} className="btn" style={{flex:2,background:"linear-gradient(135deg,#7c3aed,#6d28d9)",color:"white",border:"none",borderRadius:10,padding:"13px",fontSize:16,fontWeight:800}}>
              💾 حفظ كاختبار
            </button>
            <button onClick={()=>{setStep("upload");setStandards([]);}} className="btn btn-ghost" style={{flex:1}}>
              🔄 استيراد جديد
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
